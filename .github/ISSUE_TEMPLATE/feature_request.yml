name: Feature Request
description: Suggest a new widget or property to support
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a Flutter widget or property that should be supported in Figma conversion.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What widget or property would you like to see supported?
    validations:
      required: true

  - type: textarea
    id: screenshot-emulator
    attributes:
      label: Emulator Screenshot
      description: Screenshot showing how the widget looks in Flutter (emulator/simulator).
      placeholder: Drag and drop or paste the emulator screenshot here.
    validations:
      required: true

  - type: textarea
    id: widget-code
    attributes:
      label: Flutter Widget Code
      description: Example widget code.
      render: dart

  - type: textarea
    id: expected-figma
    attributes:
      label: Expected Figma Output
      description: How should this look in Figma? A mockup or description is helpful.
